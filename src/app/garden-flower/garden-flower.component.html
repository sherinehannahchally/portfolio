<button
  type="button"
  class="flower-node group relative flex flex-col items-center justify-center rounded-full outline-none transition-transform hover:scale-[1.04] focus-visible:ring-2 focus-visible:ring-brand/40"
  (click)="onClick($event)"
  [attr.aria-label]="'Open ' + label + ' section'"
>
  <span class="flower-bloom-inner relative flex h-[5.8rem] w-[5.8rem] items-center justify-center sm:h-28 sm:w-28">
    <img
      class="petals flower-image h-full w-full object-contain drop-shadow-sm"
      [src]="imageSrc"
      [alt]="label + ' flower'"
      draggable="false"
    />
  </span>
  <span
    class="mt-2 max-w-[6rem] text-center text-[10px] font-medium uppercase leading-tight tracking-[0.12em] text-brand dark:text-brand-soft sm:text-[11px]"
    >{{ label }}</span
  >
</button>
